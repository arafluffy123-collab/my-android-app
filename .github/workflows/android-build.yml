name: Build Android App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # 🛠️ THIS IS THE NEW MAGIC STEP THAT FIXES ERROR 127!
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708 # Installs the exact missing tools

    - name: Install Mobile Build Tools
      run: npm install -g nativescript

    - name: Install Project Dependencies
      run: npm install --legacy-peer-deps

    - name: Build Android APK
      run: ns build android --debug --copy-to build.apk

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: build.apk
